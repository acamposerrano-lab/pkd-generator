name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install python-docx lxml pillow pyinstaller comtypes

      - name: Convertir PNG a ICO
        shell: python
        run: |
          import sys, os
          from PIL import Image

          if not os.path.exists("icon.png"):
              print("AVISO: no se encontró icon.png, se compilará sin icono")
              sys.exit(0)

          img = Image.open("icon.png").convert("RGBA")
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          img.save("icon.ico", format="ICO", sizes=sizes)
          print("icon.ico generado correctamente")

      - name: Compilar con PyInstaller (usando .spec)
        shell: pwsh
        run: |
          pyinstaller reemplazar_imagenes.spec

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ReemplazadorImagenes-windows
          path: dist/ReemplazadorImagenes.exe
          retention-days: 30

      - name: Crear Release en GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ReemplazadorImagenes.exe
